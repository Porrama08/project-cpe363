<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="stylesheet" href="index.css">
</head>
<body>
    <div class="main-table">
        <div class="table-section">
            <h2>รายการห้อง</h2>
            <table border="1">
                <thead>
                    <tr><td>No</td><td>ชื่อห้อง</td><td>ราคา</td><td>Stock</td><td></td></tr>
                </thead>
                <tbody id="room-data">
                    <tr><td colspan="5" style="text-align: center;">กำลังโหลดข้อมูล...</td></tr>
                </tbody>
            </table>
        </div>

        <div class="summary-box">
            <h3>สรุปรายการจอง</h3>
            <p>จำนวนที่เลือก: <span id="count">0</span> ห้อง</p>
            <p>ราคารวม: <span id="subtotal">0</span> บาท</p>
            <p class="discount-text">ส่วนลด (10%): <span id="discount">0</span> บาท</p>
            <p>Vat (7%): <span id="vat">0</span> บาท</p>
            <hr>
            <h4>ยอดสุทธิ: <span id="total">0</span> บาท</h4>
            
            <button class="confirm-btn" onclick="confirmBooking()">Confirm</button>
            <button class="cancel-btn" onclick="location.reload()">Cancel</button>
        </div>
    </div>

    <script src="table.js"></script>
</body>
</html>
