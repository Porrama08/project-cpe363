<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Register</title>
    <link rel="stylesheet" href="regist.css"> 
</head>
<body>
    <form action="">
        <h2>สมัครสมาชิก</h2>
        <span style="color: red;">* &nbsp;&nbsp;&nbsp;</span>
        <label for="name">ชื่อ</label>
        <input type="text" id="name" name="name"
                placeholder="พิมพ์ชื่อ">

        <span style="color: red;">* &nbsp;&nbsp;&nbsp;</span>
        <label for="surname">นามสกุล</label>
        <input type="text" id="surname" name="surname"
                placeholder="นามสกุล">

        <span style="color: red;">* &nbsp;&nbsp;&nbsp;</span>
        <label for="date">Date of birth</label>
        <input type="date" name="date" id="date"><span> &nbsp;&nbsp;&nbsp </span>

        <span style="color: red;">* &nbsp;&nbsp;&nbsp;</span>
        <label for="date">Age:</label>
        <input type="number" name="age" id="age"><br><br>

        <label>Gender:</label>
        <input type="radio" name="gender" id="male" value="male">
        <label  label for="male">Male</label>

        <input type="radio" name="gender" id="female" value="female">
        <label for="female">Female</label><br><br>


        <label for="email">Email</label>
        <input type="text" id="email" name="email"
                placeholder="Enter Email address"><br><br>

        <input type="checkbox" name="check" id="check"><label for="check">ข้อมูลถูกต้อง</label><br><br>
        
        <span style="color: red;">* &nbsp;&nbsp;&nbsp;</span>
        <label for="pass">Password</label>
        <input type="password" name="pass" id="pass"><br>

        <span style="color: red;">* &nbsp;&nbsp;&nbsp;</span>
        <label for="cpass">Confirm password</label>
        <input type="password" name="cpass" id="cpass"><br><br>

         <input type="button" name="btn" id="btn" value="submit">
    </form>
</body>
</html>
