<!DOCTYPE html>
<html lang="th">
<head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">

        <link rel="icon" type="image/png" href="pic/M.O.icon.png">

    <title>Register - Mandarin Oriental</title>
    <link rel="stylesheet" href="booking.css"> <style>
        .regis-container {
            max-width: 450px;
            margin: 60px auto;
            background: white;
            padding: 40px;
            border-radius: 16px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.1);
        }
        .form-group { margin-bottom: 20px; }
        .form-group label { display: block; margin-bottom: 8px; font-weight: 500; }
        .form-group input {
            width: 100%;
            padding: 12px;
            border: 1px solid #ddd;
            border-radius: 8px;
            font-size: 16px;
            box-sizing: border-box; /* สำคัญเพื่อให้ width 100% ไม่เลยขอบ */
        }
        .btn-submit {
            width: 100%;
            background-color: #2c61fe;
            color: white;
            border: none;
            padding: 14px;
            border-radius: 8px;
            font-size: 16px;
            cursor: pointer;
            font-family: 'Kanit', sans-serif;
            margin-top: 10px;
        }
        .btn-submit:hover { background-color: #1a4bd6; }
    </style>
</head>
<body>
    <div class="regis-container">
        <h2 style="text-align: center;">สมัครสมาชิก</h2>
        <p style="text-align: center; color: #666; margin-bottom: 30px;">เข้าร่วมเป็นส่วนหนึ่งของครอบครัว Mandarin Oriental</p>
        
        <form id="regisForm">
            <div class="form-group">
                <label>ชื่อผู้ใช้ (Username)</label>
                <input type="text" id="username" required placeholder="เช่น luxury_guest">
            </div>
            <div class="form-group">
                <label>รหัสผ่าน (Password)</label>
                <input type="password" id="password" required>
            </div>
            <div class="form-group">
                <label>ยืนยันรหัสผ่าน (Confirm Password)</label>
                <input type="password" id="confirmPassword" required>
            </div>
            <div class="form-group">
                <label>ชื่อ-นามสกุล</label>
                <input type="text" id="fullname" required>
            </div>
            <div class="form-group">
                <label>เบอร์โทรศัพท์</label>
                <input type="tel" id="phone" required>
            </div>
            <button type="submit" class="btn-submit">ลงทะเบียน</button>
        </form>
        <p style="text-align: center; margin-top: 20px; font-size: 14px;">
            <a href="login.html" style="color: #666; text-decoration: none;">← กลับไปหน้าเข้าสู่ระบบ</a>
        </p>
    </div>

    <script src="regist.js"></script>
</body>
</html>
